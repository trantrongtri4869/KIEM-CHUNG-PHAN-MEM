# ==========================================
# GearVault Test Configuration
# ==========================================

# Base URL - thay đổi theo môi trường
base.url=http://localhost:5173

# Browser: chrome | firefox | edge
browser=chrome

# Headless mode (true/false)
headless=true

# Implicit wait (giây) - không dùng, chỉ dùng explicit wait
implicit.wait=0

# Explicit wait timeout (giây)
explicit.wait=10

# Page load timeout (giây)
page.load.timeout=30

# Screenshot on failure (true/false)
screenshot.on.failure=true

# Report output directory
report.dir=test-output/reports

# Screenshot directory
screenshot.dir=test-output/screenshots

# ==========================================
# Test Accounts (từ AuthPages.tsx MOCK_ACCOUNTS)
# ==========================================
user.email=user@gearvault.com
user.password=user123
user.name=John Gamer

admin.email=admin@gearvault.com
admin.password=admin123
admin.name=Admin User

# ==========================================
# Test Data - Coupon Codes (từ CartPage.tsx)
# ==========================================
coupon.valid=GEAR10
coupon.invalid=INVALID123
coupon.discount=10
