name: GearVault Total Integration CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # 1. BUILD DỰ ÁN NODE.JS
  build-node:
    name: 🟢 1. Build Node.js Project
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

  # 2. CHẠY AUTOMATION TEST MAVEN & PHÂN TÍCH SONARCLOUD
  automation-test:
    name: 🧪 2. Run Selenium Tests & SonarCloud
    runs-on: ubuntu-latest
    needs: build-node
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud cần lấy đầy đủ lịch sử commit để phân tích

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: 🧪 Chạy TestNG & Đẩy báo cáo lên SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd automation
          # Chạy test, đo coverage bằng Jacoco và đẩy thẳng dữ liệu lên SonarCloud
          mvn clean test sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  # 3. TỰ ĐỘNG ĐỒNG BỘ TRẠNG THÁI SANG JIRA
  jira-sync:
    name: 🔄 3. Sync Ticket Status to Jira
    runs-on: ubuntu-latest
    needs: automation-test
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Đăng nhập Atlassian Jira
        uses: atlassian/gajira-login@master
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: 🔎 Tìm mã số Ticket Jira từ Commit Message
        id: jira_issue
        uses: atlassian/gajira-find-issue-action@master
        with:
          string: ${{ github.event.head_commit.message }}

      - name: ⏭️ Kéo Ticket sang cột DONE
        if: steps.jira_issue.outputs.issue != ''
        uses: atlassian/gajira-transition@master
        with:
          issue: ${{ steps.jira_issue.outputs.issue }}
          transition: "Done"
