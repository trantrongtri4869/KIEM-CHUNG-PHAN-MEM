name: GearVault Core CI/CD Suite

on:
  push:
    branches: [ main ]

jobs:
  # GOM TOÀN BỘ QUY TRÌNH BUILD & TEST VÀO 1 MÔI TRƯỜNG ĐỂ CHIA SẺ HẠ TẦNG
  build-and-test:
    name: 🧪 1. Build Frontend & Run Automation Testing
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Setup Java 17 (Automation)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: 🌐 Cài đặt trình duyệt Google Chrome thực tế cho Máy ảo
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 📦 Cài đặt thư viện & Khởi động ngầm Website GearVault
        run: |
          cd gearvault/frontend
          npm install
          # Chạy ngầm website ở cổng 5173 và giải phóng dòng lệnh để chạy bước tiếp theo
          npm run dev & 
          echo "🟢 [CI] Đang chờ website khởi động trong 5 giây..."
          sleep 5

      # Bước chạy test quyết định (Đã có cả Chrome lẫn Website đang bật)
      - name: 🧪 Biên dịch và Chạy Thử TestNG Suite
        run: |
          cd automation
          mvn clean test

  # JOB 2: PHÂN TÍCH CHẤT LƯỢNG CODE
  sonarcloud-scan:
    name: 🔍 2. SonarCloud Comprehensive Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Official SonarCloud Scan Action
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # JOB 3: TỰ ĐỘNG ĐỒNG BỘ TRẠNG THÁI SANG JIRA
  jira-sync:
    name: 🔄 3. Sync Ticket Status to Jira
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always() # Bắt buộc LUÔN CHẠY để kéo thẻ Jira kể cả khi test có lỗi
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Đăng nhập Atlassian Jira
        uses: atlassian/gajira-login@master
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: 🔎 Tìm mã số Ticket Jira từ Commit Message
        id: jira_issue
        uses: atlassian/gajira-find-issue-action@master
        with:
          string: ${{ github.event.head_commit.message }}

      - name: ⏭️ Kéo Ticket sang cột DONE
        if: steps.jira_issue.outputs.issue != ''
        uses: atlassian/gajira-transition@master
        with:
          issue: ${{ steps.jira_issue.outputs.issue }}
          transition: "Done"
