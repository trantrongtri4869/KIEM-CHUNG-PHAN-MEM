name: GearVault Node.js CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sonarcloud-scan:
    name: 🔍 Quét chất lượng code SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Hoặc phiên bản Node bạn đang dùng

      # Nếu bạn có viết test (Jest/Vitest), mở 2 dòng dưới ra để chạy test lấy Coverage
      # - name: 📦 Install dependencies
      #   run: npm install
      # - name: 🧪 Run Tests
      #   run: npm test

      - name: 🔍 Gửi code lên SonarCloud phân tích
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
