name: GearVault Core CI/CD Suite

on:
  push:
    branches: [ main ]

jobs:
  build-frontend:
    name: 🟢 1. Build Frontend Project
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install Frontend Dependencies
        run: |
          cd gearvault/frontend
          npm install

  automation-test:
    name: 🧪 2. Run Automation TestNG Suite
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: 🧪 Execute Pipeline Test Connection
        run: |
          cd automation
          mvn clean test

  sonarcloud-scan:
    name: 🔍 3. SonarCloud Comprehensive Scan
    runs-on: ubuntu-latest
    needs: automation-test
    if: always()
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Official SonarCloud Scan Action
        uses: SonarSource/sonarcloud-github-action@v3.0.0
        with:
          args: >
            -Dsonar.organization=trantrongtri4869
            -Dsonar.sources=gearvault/frontend/src,gearvault/backend/src,automation/src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  jira-sync:
    name: 🔄 4. Sync Ticket Status to Jira
    runs-on: ubuntu-latest
    needs: [build-frontend, automation-test]
    if: always()
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Đăng nhập Atlassian Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: 🔎 Tìm mã số Ticket Jira từ Commit Message
        id: jira_issue
        uses: atlassian/gajira-find-issue-action@v3
        with:
          string: ${{ github.event.head_commit.message }}

      - name: ⏭️ Kéo Ticket sang cột DONE
        if: steps.jira_issue.outputs.issue != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ steps.jira_issue.outputs.issue }}
          transition: "Done"
