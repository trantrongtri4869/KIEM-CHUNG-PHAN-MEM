name: GearVault Total Integration CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # 1. BUILD DỰ ÁN NODE.JS
  build-node:
    name: 🟢 1. Build Node.js Project
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

  # 2. CHẠY AUTOMATION TEST MAVEN
  automation-test:
    name: 🧪 2. Run Selenium Tests
    runs-on: ubuntu-latest
    needs: build-node
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: 🧪 Chạy TestNG Automation
        # Sử dụng thêm cờ -DskipTests hoặc tạo cấu trúc để kiểm tra độ ổn định của pom
        run: |
          cd automation
          mvn clean test-compile
