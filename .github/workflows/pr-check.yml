name: PR Quality Check

on:
  pull_request:
    branches: [ main ]

jobs:
  pr-check:
    name: ✅ Kiểm tra PR trước khi merge
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy đủ lịch sử commit để lệnh git diff và git log hoạt động chính xác

      # Kiểm tra tên branch đúng convention chưa
      - name: 🌿 Kiểm tra tên branch
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch name: $BRANCH"

          # Kiểm tra format: [loai]/[mx]-[gvXXX]-[mo-ta]
          if echo "$BRANCH" | grep -qE "^(testcase|docs|auto|bugfix|api|config)/m[1-7]-gv[0-9]+-[a-z0-9-]+$"; then
            echo "✅ Tên branch đúng convention!"
          else
            echo "❌ Tên branch SAI convention!"
            echo "Đúng format: testcase/m2-gv004-auth-login"
            echo "Branch hiện tại: $BRANCH"
            exit 1
          fi

      # Kiểm tra commit message đúng format chưa
      - name: 💬 Kiểm tra commit message
        run: |
          # Lấy commit message gần nhất
          COMMIT_MSG=$(git log --format=%s -n 1 ${{ github.event.pull_request.head.sha }})
          echo "Commit: $COMMIT_MSG"

          # Kiểm tra có GV-XXX không
          if echo "$COMMIT_MSG" | grep -qE "\[GV-[0-9]+\]"; then
            echo "✅ Commit message có Jira ticket ID!"
          else
            echo "⚠️ Commit message không có [GV-XXX]. Nên thêm vào!"
          fi

      # Kiểm tra file đặt đúng thư mục chưa
      - name: 📁 Kiểm tra cấu trúc thư mục
        run: |
          echo "📁 Files được thay đổi trong PR này:"
          git diff --name-only origin/main...HEAD
          echo ""
          echo "✅ Kiểm tra cấu trúc thư mục hoàn tất"

      - name: 📝 Tóm tắt PR
        run: |
          echo "## ✅ PR Quality Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Kiểm tra | Kết quả |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tên branch | ✅ Đúng format |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit message | ✅ Có Jira ID |" >> $GITHUB_STEP_SUMMARY
          echo "| PR Author | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
