name: GearVault Ultimate CI/CD Suite

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:

  # ════════════════════════════════════════
  # 1. BUILD FRONTEND
  # ════════════════════════════════════════
  build-frontend:
    name: 🌐 Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        working-directory: ./gearvault/frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./gearvault/frontend
        run: npm run build


  # ════════════════════════════════════════
  # 2. RUN TESTNG + JACOCO
  # ════════════════════════════════════════
  run-testng:
    name: 🧪 Run Selenium TestNG
    runs-on: ubuntu-latest
    needs: build-frontend

    outputs:
      result: ${{ job.status }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run Maven Verify
        working-directory: ./automation
        run: |
          mvn clean verify \
            -Dchrome.headless=true \
            -Dtest.baseUrl=http://localhost:5173

      - name: Verify Generated Reports
        working-directory: ./automation
        run: |
          echo "===== TARGET ====="
          ls -R target || true

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: automation-target
          path: automation/target/


  # ════════════════════════════════════════
  # 3. SONARCLOUD SCAN
  # ════════════════════════════════════════
  sonarcloud-scan:
    name: 🔍 SonarCloud Scan
    runs-on: ubuntu-latest

    needs: run-testng

    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Download Test Artifacts
        uses: actions/download-artifact@v4
        with:
          name: automation-target
          path: automation/target/

      - name: Verify Downloaded Files
        working-directory: ./automation
        run: |
          echo "===== DOWNLOADED TARGET ====="
          ls -R target || true

      - name: Run SonarCloud
        working-directory: ./automation
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=trantrongtri4869_KIEM-CHUNG-PHAN-MEM \
            -Dsonar.organization=trantrongtri4869 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ════════════════════════════════════════
  # 4. JIRA SYNC
  # ════════════════════════════════════════
  jira-sync:
    name: 📋 Jira Sync
    runs-on: ubuntu-latest

    needs:
      - run-testng
      - sonarcloud-scan

    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


      # ─────────────────────────────
      # Extract Jira Ticket ID
      # ─────────────────────────────
      - name: Validate & Extract Jira ID
        id: extract_jira
        shell: bash

        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)

          echo "Commit message:"
          echo "$COMMIT_MSG"

          JIRA_ID=$(echo "$COMMIT_MSG" | grep -oP 'KAN-\d+' | head -1)

          if [ -z "$JIRA_ID" ]; then
            echo "::error::Missing Jira ID. Use commit format like: [KAN-123] message"
            exit 1
          fi

          echo "jira_id=$JIRA_ID" >> $GITHUB_OUTPUT
          echo "found=true" >> $GITHUB_OUTPUT

          echo "Found Jira ID: $JIRA_ID"


      # ─────────────────────────────
      # Comment To Jira Ticket
      # ─────────────────────────────
      - name: Update Jira Ticket
        if: success()

        run: |
          curl -s -X POST \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract_jira.outputs.jira_id }}/comment" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "body": {
                "type": "doc",
                "version": 1,
                "content": [
                  {
                    "type": "paragraph",
                    "content": [
                      {
                        "type": "text",
                        "text": "🤖 CI/CD Pipeline completed successfully."
                      }
                    ]
                  }
                ]
              }
            }'


      # ─────────────────────────────
      # Auto Create Bug Ticket
      # ─────────────────────────────
      - name: Create Bug Ticket When Tests Fail
        if: needs.run-testng.result == 'failure'

        run: |
          curl -s -X POST \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "fields": {
                "project": {
                  "key": "KAN"
                },
                "summary": "[AUTO-BUG] CI Pipeline Failed",
                "issuetype": {
                  "name": "Bug"
                }
              }
            }'


      # ─────────────────────────────
      # Workflow Summary
      # ─────────────────────────────
      - name: Jira Summary
        if: always()

        run: |
          echo "## 📋 CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| TestNG | ${{ needs.run-testng.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SonarCloud | ${{ needs.sonarcloud-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
