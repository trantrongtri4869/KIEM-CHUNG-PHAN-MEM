name: GearVault Ultimate CI/CD Suite

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:

  # ════════════════════════════════════════
  # BƯỚC 1: BUILD FRONTEND
  # ════════════════════════════════════════
  build-frontend:
    name: 🌐 Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        working-directory: ./gearvault/frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./gearvault/frontend
        run: npm run build
        continue-on-error: true


  # ════════════════════════════════════════
  # BƯỚC 2: RUN TESTNG + JACOCO
  # ════════════════════════════════════════
  run-testng:
    name: 🧪 Run Selenium TestNG
    runs-on: ubuntu-latest
    needs: build-frontend

    outputs:
      result: ${{ job.status }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run TestNG Tests
        working-directory: ./automation
        run: |
          mvn clean test \
            -Dchrome.headless=true \
            -Dtest.baseUrl=http://localhost:5173
        continue-on-error: true

      - name: Verify JaCoCo Report
        working-directory: ./automation
        run: |
          echo "===== TARGET STRUCTURE ====="
          ls -R target || true

          echo "===== JACOCO REPORT ====="
          ls -R target/site/jacoco || true


  # ════════════════════════════════════════
  # BƯỚC 3: SONARCLOUD SCAN
  # ════════════════════════════════════════
  sonarcloud-scan:
    name: 🔍 SonarCloud Scan
    runs-on: ubuntu-latest
    needs: run-testng
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build Automation Project
        working-directory: ./automation
        run: |
          mvn clean test

      - name: Verify Generated Classes
        working-directory: ./automation
        run: |
          echo "===== TARGET STRUCTURE ====="
          ls -R target || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.0.0

        with:
          projectBaseDir: ./automation

          args: >
            -Dsonar.organization=trantrongtri4869
            -Dsonar.projectKey=trantrongtri4869_KIEM-CHUNG-PHAN-MEM
            -Dsonar.sources=src/test/java
            -Dsonar.java.binaries=target/test-classes
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  # ════════════════════════════════════════
  # BƯỚC 4: JIRA SYNC ADVANCED
  # ════════════════════════════════════════
  jira-sync:
    name: 📋 Jira Sync
    runs-on: ubuntu-latest
    needs: [run-testng, sonarcloud-scan]
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Jira Ticket ID
        id: extract_jira
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B)
          JIRA_ID=$(echo "$MSG" | grep -oP 'KAN-\d+' | head -1)
          if [ -n "$JIRA_ID" ]; then
            echo "jira_id=$JIRA_ID" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Jira Ticket
        if: steps.extract_jira.outputs.found == 'true'
        shell: bash
        run: |
          curl -s -X POST "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract_jira.outputs.jira_id }}/comment" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"body": {"type": "doc", "version": 1, "content": [{"type": "paragraph", "content": [{"type": "text", "text": "🤖 GitHub Actions CI/CD pipeline completed."}]}]}}'

      - name: Move Jira Ticket To Done
        if: steps.extract_jira.outputs.found == 'true' && needs.run-testng.result == 'success'
        shell: bash
        run: |
          # (Giữ nguyên logic python của bạn ở đây)

      - name: Create Bug Ticket When Tests Fail
        if: needs.run-testng.result == 'failure'
        shell: bash
        run: |
          curl -s -X POST "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"fields": {"project": {"key": "KAN"}, "summary": "[AUTO-BUG] CI Pipeline Failed", "issuetype": {"name": "Bug"}, "priority": {"name": "High"}}}'

      - name: Jira Summary
        if: always()
        shell: bash
        run: |
          echo "## 📋 Jira Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Jira ID | ${{ steps.extract_jira.outputs.jira_id || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Result | ${{ needs.run-testng.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sonar Result | ${{ needs.sonarcloud-scan.result }} |" >> $GITHUB_STEP_SUMMARY
