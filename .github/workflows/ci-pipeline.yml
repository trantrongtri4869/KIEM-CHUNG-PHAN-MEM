name: GearVault Ultimate CI/CD Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ════ BƯỚC 1: Build Frontend ════
  build-frontend:
    name: 🌐 Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - run: cd gearvault/frontend && npm install
      - run: cd gearvault/frontend && npm run build
        continue-on-error: true

  # ════ BƯỚC 2: Chạy Selenium TestNG ════
  run-testng:
    name: 🧪 Run TestNG
    runs-on: ubuntu-latest
    needs: build-frontend
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17', cache: 'maven' }
      - name: Chay TestNG
        working-directory: ./automation
        run: mvn test -Dchrome.headless=true -Dtest.baseUrl=http://localhost:5173
        continue-on-error: true

  # ════ BƯỚC 3: SonarCloud Scan ════
  sonarcloud-scan:
    name: 🔍 SonarCloud Scan
    runs-on: ubuntu-latest
    needs: run-testng
    if: always()
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17', cache: 'maven' }

      # BẮT BUỘC: Compile tại đây để Sonar có file .class
      - name: Build with Maven
        working-directory: ./automation
        run: mvn clean compile

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.0.0
        with:
          args: >
            -Dsonar.organization=trantrongtri4869
            -Dsonar.projectKey=trantrongtri4869_KIEM-CHUNG-PHAN-MEM
            -Dsonar.sources=gearvault/frontend/src,gearvault/backend/src,automation/src
            -Dsonar.java.binaries=**/target/classes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ════ BƯỚC 4: Jira Sync ════
  jira-sync:
    name: 📋 Jira Sync
    runs-on: ubuntu-latest
    needs: run-testng
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Trich xuat Jira Ticket ID
        id: extract_jira
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          JIRA_ID=$(echo "$COMMIT_MSG" | grep -oP '\[KAN-\d+\]' | tr -d '[]' | head -1)
          echo "jira_id=$JIRA_ID" >> $GITHUB_OUTPUT
          echo "found=$([ -n "$JIRA_ID" ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
      
      - name: Cap nhat Jira ticket
        if: steps.extract_jira.outputs.found == 'true'
        run: |
          curl -s -X POST "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract_jira.outputs.jira_id }}/comment" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"body": {"type": "doc", "version": 1, "content": [{"type": "paragraph", "content": [{"type": "text", "text": "🤖 CI Pipeline chạy xong! Kết quả: ${{ needs.run-testng.result }}"}]}]}}'

      - name: Tao Bug ticket tren Jira khi Test Fail
        if: needs.run-testng.result == 'failure'
        run: |
          curl -s -X POST "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"fields": {"project": {"key": "KAN"}, "summary": "[AUTO-BUG] CI Pipeline Failed", "issuetype": {"name": "Bug"}}}'
