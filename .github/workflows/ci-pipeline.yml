name: GearVault Ultimate CI/CD Suite

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Cho phép bấm nút "Run workflow" bằng tay

jobs:
  build-frontend:
    name: 🟢 Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - run: cd gearvault/frontend && npm install

  automation-test:
    name: 🧪 Run TestNG
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17', cache: 'maven' }
      - run: cd automation && mvn clean test

  sonarcloud-scan:
    name: 🔍 SonarCloud Scan
    runs-on: ubuntu-latest
    needs: automation-test
    if: always()
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: SonarSource/sonarcloud-github-action@v3.0.0
        with:
          args: >
            -Dsonar.organization=trantrongtri4869
            -Dsonar.sources=gearvault/frontend/src,gearvault/backend/src,automation/src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  jira-sync:
    name: 🔄 Jira Sync
    runs-on: ubuntu-latest
    needs: [build-frontend, automation-test]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: atlassian/gajira-cli@v3
        with: { action: login }
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      - id: jira_issue
        uses: atlassian/gajira-cli@v3
        with:
          action: find-issue
          string: ${{ github.event.head_commit.message }}
      - if: steps.jira_issue.outputs.issue != ''
        uses: atlassian/gajira-cli@v3
        with:
          action: transition-issue
          issue: ${{ steps.jira_issue.outputs.issue }}
          transition: "Done"
