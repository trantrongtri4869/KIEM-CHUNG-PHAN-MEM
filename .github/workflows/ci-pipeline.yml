name: GearVault Ultimate CI/CD Suite

on:
  push:
    branches: [ main, 'SP*', 'sprint*', 'feature*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # 1. BUILD FRONTEND (React + Vite + TS)
  # ─────────────────────────────────────────
  build-frontend:
    name: 🌐 Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: gearvault/frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./gearvault/frontend
        run: npm install

      - name: Type Check
        working-directory: ./gearvault/frontend
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build Production
        working-directory: ./gearvault/frontend
        run: npm run build

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: gearvault/frontend/dist/

  # ─────────────────────────────────────────
  # 2. BUILD BACKEND (Node.js + Express)
  # ─────────────────────────────────────────
  build-backend:
    name: 🔧 Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: gearvault/backend/package-lock.json

      - name: Install Dependencies
        working-directory: ./gearvault/backend
        run: npm install

      - name: Lint Check
        working-directory: ./gearvault/backend
        run: npm run lint --if-present
        continue-on-error: true

      - name: Upload Backend Build
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: gearvault/backend/

  # ─────────────────────────────────────────
  # 3. UNIT TEST FRONTEND (Vitest)
  # ─────────────────────────────────────────
  unit-test-frontend:
    name: ⚡ Unit Test (Vitest)
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: gearvault/frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./gearvault/frontend
        run: npm install

      - name: Run Vitest
        working-directory: ./gearvault/frontend
        run: npm run test:coverage --if-present || npm run test -- --run
        continue-on-error: true

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: gearvault/frontend/coverage/
        if: always()

  # ─────────────────────────────────────────
  # 4. CHECK OPEN API / HEALTH ENDPOINT
  #    (Mendora — verify API contract)
  # ─────────────────────────────────────────
  check-open-api:
    name: 🔌 Check Open API (Mendora)
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download Backend
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: gearvault/backend/

      - name: Start Backend Server
        working-directory: ./gearvault/backend
        run: |
          npm install
          echo "PORT=5000" > .env
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "NODE_ENV=test" >> .env
          export PORT=5000
          export MONGO_URI="${{ secrets.MONGO_URI }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          export NODE_ENV=test
          npm start &
          sleep 10
        continue-on-error: true

      - name: Verify API Health Endpoint
        run: |
          echo "=== Checking API Health ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health || echo "000")
          echo "API Health Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ API is healthy"
          else
            echo "⚠️ API returned status $STATUS (server may need MongoDB)"
          fi
        continue-on-error: true

      - name: Verify Key API Endpoints Exist
        run: |
          echo "=== Checking API Endpoints ==="
          for endpoint in "/api/products" "/api/auth/profile"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000$endpoint || echo "000")
            echo "Endpoint $endpoint → HTTP $STATUS"
          done
        continue-on-error: true

      - name: Summary Open API Check
        run: |
          echo "## 🔌 Open API Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Expected |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| /api/health | 200 OK |" >> $GITHUB_STEP_SUMMARY
          echo "| /api/products | 200 OK |" >> $GITHUB_STEP_SUMMARY
          echo "| /api/auth/profile | 401 Unauthorized |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # 5. RUN SELENIUM TESTNG + JACOCO
  # ─────────────────────────────────────────
  run-testng:
    name: 🧪 Run Selenium TestNG
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Start Backend
        working-directory: ./gearvault/backend
        run: |
          npm install
          echo "PORT=5000" > .env
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "NODE_ENV=test" >> .env
          export PORT=5000
          export MONGO_URI="${{ secrets.MONGO_URI }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          export NODE_ENV=test
          npm start &
          sleep 10
        continue-on-error: true

      - name: Start Frontend Dev Server
        working-directory: ./gearvault/frontend
        run: |
          npm install
          npm run dev &
          sleep 10
        continue-on-error: true

      - name: Run TestNG + JaCoCo
        working-directory: ./automation
        run: |
          mvn clean verify \
            -Dchrome.headless=true \
            -Dtest.baseUrl=http://localhost:5173
        continue-on-error: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: automation-target
          path: automation/target/
        if: always()

      - name: Publish TestNG Report
        uses: actions/upload-artifact@v4
        with:
          name: testng-report
          path: automation/target/surefire-reports/
        if: always()

  # ─────────────────────────────────────────
  # 6. DEPLOY TO DEV (simulate local)
  #    Dev (App + Database)
  # ─────────────────────────────────────────
  deploy-dev:
    name: 🚀 Deploy to Dev
    runs-on: ubuntu-latest
    needs: [run-testng, unit-test-frontend]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: gearvault/frontend/dist/

      - name: Download Backend Build
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: gearvault/backend/

      # Simulate Dev environment (App + Database)
      - name: Deploy Backend to Dev
        working-directory: ./gearvault/backend
        run: |
          npm install
          echo "PORT=5001" > .env.dev
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env.dev
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.dev
          echo "NODE_ENV=development" >> .env.dev
          export PORT=5001
          export MONGO_URI="${{ secrets.MONGO_URI }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          export NODE_ENV=development
          echo "✅ Backend deployed to Dev → http://localhost:5001"
          echo "🗄️ Database: MongoDB Atlas"

      - name: Deploy Frontend to Dev
        working-directory: ./gearvault/frontend
        run: |
          echo "✅ Frontend build ready at dist/"
          echo "📁 Files: $(ls dist/ | wc -l) files"
          echo "🌐 Simulated Dev URL: http://localhost:5173 (Dev)"

      - name: Verify Dev Deployment
        run: |
          echo "=== Dev Deployment Verification ==="
          echo "✅ Frontend: Built and ready"
          echo "✅ Backend:  Configured for Dev"
          echo "✅ Database: gearvault_dev (MongoDB)"
          echo "📋 Branch: ${{ github.ref_name }}"
          echo "📋 Commit: ${{ github.sha }}"

      - name: Dev Deployment Summary
        run: |
          echo "## 🚀 Dev Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ✅ Deployed | http://localhost:5173 |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | ✅ Deployed | http://localhost:5001 |" >> $GITHUB_STEP_SUMMARY
          echo "| Database | ✅ Ready    | gearvault_dev (MongoDB) |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch   | ${{ github.ref_name }} | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # 7. MONGODB COMPARE: Dev vs Product
  #    Dev DB ←compare→ Product DB
  # ─────────────────────────────────────────
  compare-mongodb:
    name: 🗄️ Compare MongoDB Dev vs Product
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Install mongosh
        run: |
          wget -qO - https://www.mongodb.org/static/pgp/server-6.0.asc | sudo apt-key add -
          echo "deb [ arch=amd64 ] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/6.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-6.0.list
          sudo apt-get update -qq
          sudo apt-get install -y mongodb-mongosh 2>/dev/null || true

      - name: Compare Collections Dev vs Product
        run: |
          echo "=== 🗄️ MongoDB Comparison: Dev vs Product ==="
          MONGO="${{ secrets.MONGO_URI }}"

          DEV_PRODUCTS=$(mongosh --quiet "$MONGO" \
            --eval "db.getSiblingDB('gearvault_dev').products.countDocuments()" 2>/dev/null || echo "N/A")
          PROD_PRODUCTS=$(mongosh --quiet "$MONGO" \
            --eval "db.getSiblingDB('gearvault').products.countDocuments()" 2>/dev/null || echo "N/A")

          DEV_USERS=$(mongosh --quiet "$MONGO" \
            --eval "db.getSiblingDB('gearvault_dev').users.countDocuments()" 2>/dev/null || echo "N/A")
          PROD_USERS=$(mongosh --quiet "$MONGO" \
            --eval "db.getSiblingDB('gearvault').users.countDocuments()" 2>/dev/null || echo "N/A")

          echo "Collection     | Dev  | Product | Status"
          echo "---------------|------|---------|-------"
          echo "products       | $DEV_PRODUCTS | $PROD_PRODUCTS  | $([ "$DEV_PRODUCTS" = "$PROD_PRODUCTS" ] && echo '✅ Match' || echo '⚠️ Diff')"
          echo "users          | $DEV_USERS | $PROD_USERS     | $([ "$DEV_USERS" = "$PROD_USERS" ] && echo '✅ Match' || echo '⚠️ Diff')"

          # Ghi vào env để job sau dùng
          echo "DEV_PRODUCTS=$DEV_PRODUCTS" >> $GITHUB_ENV
          echo "PROD_PRODUCTS=$PROD_PRODUCTS" >> $GITHUB_ENV
        continue-on-error: true

      - name: Rot Data (Migrate Dev → Product if needed)
        run: |
          echo "=== 🔄 'Rót' Data: Dev → Product ==="
          if [ "$DEV_PRODUCTS" != "$PROD_PRODUCTS" ] && [ "$DEV_PRODUCTS" != "N/A" ]; then
            echo "⚠️ Product DB thiếu dữ liệu so với Dev"
            echo "🔄 Simulating data migration Dev → Product..."
            mongosh --quiet "${{ secrets.MONGO_URI }}" --eval "
              print('Migration: syncing products from Dev...');
            " 2>/dev/null || true
            echo "✅ Migration simulated"
          else
            echo "✅ Dev và Product DB đồng bộ, không cần migrate"
          fi
        continue-on-error: true

      - name: DB Compare Summary
        run: |
          echo "## 🗄️ MongoDB Compare Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Collection | Dev | Product | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| products | ${{ env.DEV_PRODUCTS }} | ${{ env.PROD_PRODUCTS }} | compared |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 'Rót': migrate data từ Dev sang Product nếu lệch" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # 8. POSTMAN API TEST (Dev environment)
  #    Postman → deploy (version)
  #    → Tự động tạo Bug trên Jira nếu fail
  # ─────────────────────────────────────────
  postman-test:
    name: 📮 Postman API Test
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman (Postman CLI)
        run: npm install -g newman newman-reporter-htmlextra newman-reporter-json

      - name: Start Backend for Postman
        working-directory: ./gearvault/backend
        run: |
          npm install
          echo "PORT=5000" > .env
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "NODE_ENV=development" >> .env
          export PORT=5000
          export MONGO_URI="${{ secrets.MONGO_URI }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          export NODE_ENV=development
          npm start &
          sleep 10
        continue-on-error: true

      - name: Run Postman Collection (Newman)
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "DEPLOY_VERSION=$VERSION" >> $GITHUB_ENV
          echo "🏷️ Deploy Version: $VERSION"

          newman run gearvault/backend/postman/GearVault.postman_collection.json \
            --environment gearvault/backend/postman/dev.postman_environment.json \
            --reporters cli,htmlextra,json \
            --reporter-htmlextra-export postman-report.html \
            --reporter-json-export postman-results.json \
            --suppress-exit-code
        continue-on-error: true

      - name: Parse Newman Results
        run: |
          if [ -f "postman-results.json" ]; then
            PASS=$(cat postman-results.json | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          stats = d.get('run',{}).get('stats',{}).get('assertions',{})
          print(stats.get('total',0) - stats.get('failed',0))
          " 2>/dev/null || echo "0")

            FAIL=$(cat postman-results.json | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          stats = d.get('run',{}).get('stats',{}).get('assertions',{})
          print(stats.get('failed',0))
          " 2>/dev/null || echo "0")

            # Lấy danh sách test case bị fail
            FAIL_DETAILS=$(cat postman-results.json | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          fails = []
          for ex in d.get('run',{}).get('executions',[]):
              req_name = ex.get('item',{}).get('name','Unknown')
              for a in ex.get('assertions',[]):
                  if a.get('error'):
                      fails.append(f\"- [{req_name}] {a.get('assertion','?')}: {a.get('error',{}).get('message','?')}\")
          print('\n'.join(fails[:20]) if fails else 'Không có chi tiết')
          " 2>/dev/null || echo "Không thể parse chi tiết")

            echo "POSTMAN_PASS=$PASS" >> $GITHUB_ENV
            echo "POSTMAN_FAIL=$FAIL" >> $GITHUB_ENV
            echo "Newman: $PASS passed, $FAIL failed"
            echo "Fail details: $FAIL_DETAILS"

            # Lưu fail details vào file để dùng ở step sau
            echo "$FAIL_DETAILS" > postman-fail-details.txt
          else
            echo "POSTMAN_PASS=0" >> $GITHUB_ENV
            echo "POSTMAN_FAIL=1" >> $GITHUB_ENV
            echo "⚠️ Không tìm thấy postman-results.json" > postman-fail-details.txt
          fi

      - name: Upload Postman Report
        uses: actions/upload-artifact@v4
        with:
          name: postman-report
          path: |
            postman-report.html
            postman-results.json
        if: always()

      # ── Tự động tạo Bug trên Jira khi có test fail ──
      - name: Create Jira Bug on Postman Failure
        if: always() && env.POSTMAN_FAIL != '0' && env.POSTMAN_FAIL != ''
        run: |
          echo "❌ Postman có ${{ env.POSTMAN_FAIL }} assertion(s) thất bại → Tạo Jira Bug..."

          FAIL_DETAILS=$(cat postman-fail-details.txt 2>/dev/null || echo "Không có chi tiết")
          # Escape ký tự đặc biệt cho JSON
          FAIL_DETAILS_ESC=$(echo "$FAIL_DETAILS" | python3 -c "
          import sys,json
          print(json.dumps(sys.stdin.read())[1:-1])
          ")

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"fields\": {
                \"project\": { \"key\": \"KAN\" },
                \"summary\": \"[AUTO-BUG] Postman API Test Failed - ${{ github.ref_name }} - Run #${{ github.run_number }}\",
                \"issuetype\": { \"name\": \"Bug\" },
                \"priority\": { \"name\": \"High\" },
                \"description\": {
                  \"type\": \"doc\",
                  \"version\": 1,
                  \"content\": [
                    {
                      \"type\": \"paragraph\",
                      \"content\": [{ \"type\": \"text\", \"text\": \"🤖 Bug được tạo tự động bởi CI/CD Pipeline\" }]
                    },
                    {
                      \"type\": \"paragraph\",
                      \"content\": [{ \"type\": \"text\", \"text\": \"📌 Branch: ${{ github.ref_name }}\\n📌 Commit: ${{ github.sha }}\\n📌 Author: ${{ github.actor }}\\n📌 Deploy Version: ${{ env.DEPLOY_VERSION }}\\n\\n❌ Tests Failed: ${{ env.POSTMAN_FAIL }}\\n✅ Tests Passed: ${{ env.POSTMAN_PASS }}\" }]
                    },
                    {
                      \"type\": \"paragraph\",
                      \"content\": [{ \"type\": \"text\", \"text\": \"📋 Chi tiết lỗi:\\n$FAIL_DETAILS_ESC\" }]
                    },
                    {
                      \"type\": \"paragraph\",
                      \"content\": [{ \"type\": \"text\", \"text\": \"🔗 Xem full report: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\" }]
                    }
                  ]
                }
              }
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          BUG_KEY=$(echo "$BODY" | grep -o '"key":"[^"]*"' | head -1 | cut -d'"' -f4)

          if [ "$HTTP_CODE" = "201" ] && [ -n "$BUG_KEY" ]; then
            echo "✅ Jira Bug đã được tạo: $BUG_KEY"
            echo "🔗 Link: ${{ secrets.JIRA_BASE_URL }}/browse/$BUG_KEY"
            echo "POSTMAN_BUG_KEY=$BUG_KEY" >> $GITHUB_ENV
          else
            echo "⚠️ Tạo Bug thất bại. HTTP: $HTTP_CODE"
            echo "Response: $BODY"
          fi
        continue-on-error: true

      - name: Postman Summary
        if: always()
        run: |
          echo "## 📮 Postman API Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Version | ${{ env.DEPLOY_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Passed   | ✅ ${{ env.POSTMAN_PASS }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Failed   | ❌ ${{ env.POSTMAN_FAIL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Jira Bug       | ${{ env.POSTMAN_BUG_KEY || 'None' }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # 9. SONARCLOUD SCAN
  # ─────────────────────────────────────────
  sonarcloud-scan:
    name: 🔍 SonarCloud Scan
    runs-on: ubuntu-latest
    needs: run-testng
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: automation-target
          path: automation/target/

      - name: Compile Project
        working-directory: ./automation
        run: mvn compile test-compile -DskipTests

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.0.0
        with:
          projectBaseDir: ./automation
          args: >
            -Dsonar.organization=trantrongtri4869
            -Dsonar.projectKey=trantrongtri4869_KIEM-CHUNG-PHAN-MEM
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.java.binaries=target/test-classes
            -Dsonar.sources=src/test/java
            -Dsonar.exclusions=**/*.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────
  # 10. JIRA SYNC — FULL
  #     Member(2) → ID-comment → Jira
  # ─────────────────────────────────────────
  jira-sync:
    name: 📋 Jira Sync (Full)
    runs-on: ubuntu-latest
    needs: [run-testng, sonarcloud-scan, deploy-dev, postman-test, compare-mongodb]
    if: always()
    steps:
      - uses: actions/checkout@v4

      # ── Extract Jira ID từ commit (ID-comment) ──
      - name: Extract Jira ID & Branch Info
        id: extract_jira
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          AUTHOR_EMAIL=$(git log -1 --pretty=%ae)
          BRANCH="${{ github.ref_name }}"

          echo "Commit: $MSG"
          echo "Author: $AUTHOR ($AUTHOR_EMAIL)"
          echo "Branch: $BRANCH"

          # Extract Jira ID (KAN-123)
          JIRA_ID=$(echo "$MSG" | grep -oP 'KAN-\d+' | head -1 || echo "")
          echo "jira_id=$JIRA_ID" >> $GITHUB_OUTPUT
          if [ -n "$JIRA_ID" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

          # Detect sprint branch (SP1, SP2, sprint/1)
          SPRINT=$(echo "$BRANCH" | grep -oP '(SP\d+|sprint[\-/]\d+)' | head -1 || echo "")
          echo "sprint=$SPRINT" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "author_email=$AUTHOR_EMAIL" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      # ── Xác định trạng thái toàn pipeline ──
      - name: Determine Pipeline Status
        id: pipeline_status
        shell: bash
        run: |
          TESTNG="${{ needs.run-testng.result }}"
          SONAR="${{ needs.sonarcloud-scan.result }}"
          DEPLOY="${{ needs.deploy-dev.result }}"
          POSTMAN="${{ needs.postman-test.result }}"
          DB="${{ needs.compare-mongodb.result }}"

          FAIL_COUNT=0
          [ "$TESTNG"  = "failure" ] && FAIL_COUNT=$((FAIL_COUNT+1))
          [ "$SONAR"   = "failure" ] && FAIL_COUNT=$((FAIL_COUNT+1))
          [ "$DEPLOY"  = "failure" ] && FAIL_COUNT=$((FAIL_COUNT+1))
          [ "$POSTMAN" = "failure" ] && FAIL_COUNT=$((FAIL_COUNT+1))

          if [ "$FAIL_COUNT" = "0" ]; then
            STATUS="✅ PASSED"; EMOJI="✅"; JIRA_STATUS="Done"
          elif [ "$FAIL_COUNT" -ge "2" ]; then
            STATUS="❌ FAILED"; EMOJI="❌"; JIRA_STATUS="Blocked"
          else
            STATUS="⚠️ PARTIAL"; EMOJI="⚠️"; JIRA_STATUS="In Progress"
          fi

          echo "status=$STATUS"       >> $GITHUB_OUTPUT
          echo "emoji=$EMOJI"         >> $GITHUB_OUTPUT
          echo "jira_status=$JIRA_STATUS" >> $GITHUB_OUTPUT
          echo "fail_count=$FAIL_COUNT"   >> $GITHUB_OUTPUT

      # ── Log comment vào Jira ticket (ID-comment) ──
      - name: Log Comment to Jira
        if: steps.extract_jira.outputs.found == 'true'
        run: |
          TEXT="🤖 CI/CD Pipeline Report | Branch: ${{ steps.extract_jira.outputs.branch }} | Commit: ${{ github.sha }} | Author: ${{ steps.extract_jira.outputs.author }} | Sprint: ${{ steps.extract_jira.outputs.sprint }} | Status: ${{ steps.pipeline_status.outputs.status }} | Jobs: TestNG=${{ needs.run-testng.result }} | SonarCloud=${{ needs.sonarcloud-scan.result }} | Deploy-Dev=${{ needs.deploy-dev.result }} | Postman=${{ needs.postman-test.result }} | DB-Compare=${{ needs.compare-mongodb.result }} | Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract_jira.outputs.jira_id }}/comment" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"$TEXT\"}]}]}}"

          echo "✅ Comment logged to ${{ steps.extract_jira.outputs.jira_id }}"

      # ── Assign Leader khi có lỗi ──
      - name: Assign to Leader on Error
        if: |
          steps.extract_jira.outputs.found == 'true' &&
          steps.pipeline_status.outputs.fail_count != '0'
        run: |
          echo "⚠️ Pipeline có lỗi → Assign cho Leader"

          # Lấy accountId của Leader từ Jira
          LEADER_ID=$(curl -s \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/user/search?query=${{ secrets.JIRA_LEADER_EMAIL }}" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            | grep -o '"accountId":"[^"]*"' | head -1 | cut -d'"' -f4)

          if [ -n "$LEADER_ID" ]; then
            curl -s -X PUT \
              "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract_jira.outputs.jira_id }}/assignee" \
              -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"accountId\":\"$LEADER_ID\"}"
            echo "✅ Assigned to Leader: ${{ secrets.JIRA_LEADER_EMAIL }}"
          else
            echo "⚠️ Leader account not found, skipping assign"
          fi

          # Log task lỗi vào Jira comment
          LOG_TEXT="🚨 Log Task: Pipeline FAILED (${{ steps.pipeline_status.outputs.fail_count }} job(s) failed) | Assigned to Leader for review | Branch: ${{ steps.extract_jira.outputs.branch }} | Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract_jira.outputs.jira_id }}/comment" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"$LOG_TEXT\"}]}]}}"
        continue-on-error: true

      # ── Assign Member theo branch sprint ──
      - name: Assign Member by Sprint Branch
        if: |
          steps.extract_jira.outputs.found == 'true' &&
          steps.pipeline_status.outputs.fail_count == '0'
        run: |
          echo "✅ Pipeline passed → Assign member cho sprint task"
          BRANCH="${{ steps.extract_jira.outputs.branch }}"
          SPRINT="${{ steps.extract_jira.outputs.sprint }}"

          if [ -n "$SPRINT" ]; then
            # Map số sprint → JIRA_MEMBER_EMAIL_1..6
            SPRINT_NUM=$(echo "$SPRINT" | grep -oP '\d+' | head -1 || echo "1")
            case "$SPRINT_NUM" in
              1) MEMBER_EMAIL="${{ secrets.JIRA_MEMBER_EMAIL_1 }}" ;;
              2) MEMBER_EMAIL="${{ secrets.JIRA_MEMBER_EMAIL_2 }}" ;;
              3) MEMBER_EMAIL="${{ secrets.JIRA_MEMBER_EMAIL_3 }}" ;;
              4) MEMBER_EMAIL="${{ secrets.JIRA_MEMBER_EMAIL_4 }}" ;;
              5) MEMBER_EMAIL="${{ secrets.JIRA_MEMBER_EMAIL_5 }}" ;;
              6) MEMBER_EMAIL="${{ secrets.JIRA_MEMBER_EMAIL_6 }}" ;;
              *) MEMBER_EMAIL="${{ secrets.JIRA_MEMBER_EMAIL_1 }}" ;;
            esac

            echo "📌 Sprint $SPRINT_NUM → Assign to: $MEMBER_EMAIL"

            MEMBER_ID=$(curl -s \
              "${{ secrets.JIRA_BASE_URL }}/rest/api/3/user/search?query=$MEMBER_EMAIL" \
              -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              | grep -o '"accountId":"[^"]*"' | head -1 | cut -d'"' -f4)

            if [ -n "$MEMBER_ID" ]; then
              curl -s -X PUT \
                "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract_jira.outputs.jira_id }}/assignee" \
                -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{\"accountId\":\"$MEMBER_ID\"}"
              echo "✅ Assigned to Member ($SPRINT): $MEMBER_EMAIL"
            else
              echo "⚠️ Không tìm thấy account Jira cho $MEMBER_EMAIL"
            fi
          else
            echo "ℹ️ Không phải sprint branch, bỏ qua assign member"
          fi
        continue-on-error: true

      # ── History Log ──
      - name: History Log & Roll
        if: always()
        run: |
          echo "=== 📜 History Log ===" 
          echo "Run #${{ github.run_number }}"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Branch: ${{ steps.extract_jira.outputs.branch }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ steps.extract_jira.outputs.author }}"
          echo "Sprint: ${{ steps.extract_jira.outputs.sprint }}"
          echo "Jira:   ${{ steps.extract_jira.outputs.jira_id }}"
          echo "Status: ${{ steps.pipeline_status.outputs.status }}"
          echo "TestNG:   ${{ needs.run-testng.result }}"
          echo "Sonar:    ${{ needs.sonarcloud-scan.result }}"
          echo "Deploy:   ${{ needs.deploy-dev.result }}"
          echo "Postman:  ${{ needs.postman-test.result }}"
          echo "DB:       ${{ needs.compare-mongodb.result }}"

      # ── Pipeline Summary tổng hợp ──
      - name: Pipeline Summary
        if: always()
        run: |
          echo "## ${{ steps.pipeline_status.outputs.emoji }} GearVault CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Build Frontend       | ${{ needs.build-frontend.result    || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Build Backend        | ${{ needs.build-backend.result     || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ Unit Test Vitest     | ${{ needs.unit-test-frontend.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔌 Open API Check       | ${{ needs.check-open-api.result    || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 TestNG Selenium      | ${{ needs.run-testng.result        || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy Dev           | ${{ needs.deploy-dev.result        || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ MongoDB Compare      | ${{ needs.compare-mongodb.result   || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📮 Postman API Test     | ${{ needs.postman-test.result      || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 SonarCloud           | ${{ needs.sonarcloud-scan.result   || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Jira Ticket:** ${{ steps.extract_jira.outputs.jira_id || 'None' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Sprint:** ${{ steps.extract_jira.outputs.sprint || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ steps.extract_jira.outputs.author }}" >> $GITHUB_STEP_SUMMARY
          echo "**Overall:** ${{ steps.pipeline_status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
